<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laulima | Content Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            box-sizing: border-box;
            font-family: 'Inter', sans-serif; 
            /* MATCHED COLOR: From Value Calculator */
            background: #008dd5;
            color: #ffffff; 
            -webkit-font-smoothing: antialiased;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .hw-card { 
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 2rem; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); 
        }
        .hidden { display: none !important; }
        
        .atmospheric-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: blob-float 20s ease-in-out infinite;
        }
        /* MATCHED BLOBS: From Value Calculator */
        .blob-1 { width: 400px; height: 400px; background: #6610f2; top: -50px; right: -50px; }
        .blob-2 { width: 500px; height: 500px; background: #00ffc5; bottom: -100px; left: -100px; animation-delay: -5s; }
        
        @keyframes blob-float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 30px) scale(1.1); }
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
            outline: none;
        }
        .glass-input::placeholder { color: rgba(255, 255, 255, 0.5); }

        .wrap-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            line-break: loose;
        }

        .url-preview-clamp {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .perk-radio:checked + span { color: #ffffff; }
        .perk-container:has(.perk-radio:checked) {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffffff;
        }
    </style>
</head>
<body class="p-6">
    <div class="atmospheric-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="max-w-md w-full relative z-10">
        <!-- STEP 1: CREATOR SUBMISSION -->
        <section id="page-creator" class="hw-card p-8 md:p-10">
            <div class="mb-8 flex justify-between items-start">
                <div>
                    <h2 class="text-2xl font-bold text-white">Content Exchange</h2>
                    <p class="text-white/70 text-sm mt-1">Submit your content to verify your perks.</p>
                </div>
                <button onclick="resetCreator()" class="text-[10px] font-black uppercase tracking-widest text-white/40 hover:text-white flex items-center gap-1 transition-all">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
                    Reset
                </button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-white/60 mb-2">Instagram Post Link</label> 
                    <input type="url" id="creator-url" placeholder="Paste Instagram post or reel link here..." class="w-full glass-input rounded-xl py-4 px-6 text-sm">
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-white/60 mb-3">Choose Your Perk</label>
                    <div class="grid grid-cols-1 gap-2">
                        <label class="perk-container flex items-center gap-3 p-4 bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 cursor-pointer transition-all"> 
                            <input type="radio" name="perk" value="1 Night Complimentary Stay" class="perk-radio w-4 h-4 accent-white"> 
                            <span class="text-xs font-semibold text-white/80">🛌 1 Night Complimentary Stay</span> 
                        </label> 
                        <label class="perk-container flex items-center gap-3 p-4 bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 cursor-pointer transition-all"> 
                            <input type="radio" name="perk" value="25% Discount Voucher" class="perk-radio w-4 h-4 accent-white"> 
                            <span class="text-xs font-semibold text-white/80">🎟️ 25% Discount Voucher</span> 
                        </label>
                    </div>
                </div>

                <div id="approval-link-container" class="hidden animate-in fade-in slide-in-from-top-2 duration-500">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-white/60 mb-2">Review Submission Link</label>
                    <div class="bg-white/10 border border-white/20 p-4 rounded-xl flex items-start gap-3">
                        <div class="flex-1 min-w-0">
                            <div id="generated-link-text" class="url-preview-clamp wrap-content text-[10px] font-mono text-white/80 leading-relaxed"></div>
                        </div>
                        <button onclick="copyGeneratedLink()" class="shrink-0 p-2 bg-white/20 rounded-lg text-white hover:bg-white/30 transition-all">
                            <svg width="14" height="14" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="pt-2 space-y-3">
                    <button onclick="processCreatorRequest('email')" class="w-full bg-white text-slate-900 py-4 rounded-xl font-bold uppercase tracking-widest text-[11px] hover:bg-slate-100 transition-all shadow-xl"> 
                        Send via Email 
                    </button> 
                    <button onclick="processCreatorRequest('instagram')" class="w-full bg-transparent border border-white/30 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-[11px] hover:bg-white/10 transition-all flex items-center justify-center gap-2">
                        <svg width="16" height="16" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="20" height="20" x="2" y="2" rx="5" ry="5" /><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" /><line x1="17.5" x2="17.51" y1="6.5" y2="6.5" />
                        </svg><span>Instagram DM</span> 
                    </button>
                </div>
            </div>
        </section>

        <!-- STEP 2: BUSINESS APPROVAL -->
        <section id="page-business" class="hw-card p-8 md:p-10 hidden">
            <div class="mb-8 flex justify-between items-start">
                <div>
                    <h2 class="text-2xl font-bold text-white">Review Submission</h2>
                    <p class="text-white/70 text-sm mt-1">Verify the content and issue a reward.</p>
                </div>
                <button onclick="resetCreator()" class="text-[10px] font-black uppercase tracking-widest text-white/40 hover:text-white flex items-center gap-1 transition-all">Back</button>
            </div>
            
            <div class="space-y-6">
                <div class="bg-white/10 p-6 rounded-xl border border-white/10">
                    <p class="text-[9px] font-black uppercase tracking-widest text-white/50 mb-3">Submission Details</p>
                    <a id="business-view-link" href="#" target="_blank" class="flex items-center gap-2 text-sm font-bold text-white underline decoration-white/30"> Open Social Post 
                        <svg width="14" height="14" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" x2="21" y1="14" y2="3" />
                        </svg>
                    </a>
                    <div id="display-perks" class="text-xs font-medium text-white/90 mt-3 pt-3 border-t border-white/10"></div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-white/60 mb-3">Reward Code</label>
                    <div class="flex gap-2">
                        <input type="text" id="promo-input" placeholder="e.g. GIFT-X21" class="flex-1 glass-input rounded-xl py-4 px-5 font-mono font-bold uppercase text-sm tracking-widest"> 
                        <button onclick="generateRandomCode()" class="bg-white/20 text-white px-4 rounded-xl hover:bg-white/30 transition-all border border-white/10">✨</button>
                    </div>
                </div>

                <div class="space-y-3 pt-2">
                    <button onclick="processBusinessResponse('accept', 'email')" class="w-full bg-white text-slate-900 py-4 rounded-xl font-bold uppercase tracking-widest text-[11px] hover:bg-slate-100 transition-all shadow-xl"> Approve via Email </button> 
                    <button onclick="processBusinessResponse('accept', 'instagram')" class="w-full bg-transparent border border-white/30 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-[11px] hover:bg-white/10 transition-all flex items-center justify-center gap-2">
                        <svg width="16" height="16" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="20" height="20" x="2" y="2" rx="5" ry="5" /><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" /><line x1="17.5" x2="17.51" y1="6.5" y2="6.5" />
                        </svg><span>Approve via Instagram</span> 
                    </button> 
                    <div class="pt-2 border-t border-white/5 flex flex-col gap-2">
                        <button onclick="processBusinessResponse('decline', 'email')" class="w-full text-white/50 text-[10px] font-bold uppercase tracking-widest py-2 hover:text-white transition-all text-center"> Decline via Email </button>
                        <button onclick="processBusinessResponse('decline', 'instagram')" class="w-full text-white/30 text-[10px] font-bold uppercase tracking-widest py-2 hover:text-white transition-all text-center"> Decline via Instagram </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- PREVIEW MODAL -->
        <div id="preview-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center p-6 hidden">
            <div class="hw-card w-full max-w-md rounded-3xl overflow-hidden shadow-2xl animate-in fade-in zoom-in-95 duration-300">
                <div class="p-6 border-b border-white/10 flex justify-between architecture items-center bg-white/5">
                    <span id="modal-title" class="text-[9px] font-black uppercase tracking-widest text-white/70">Message Preview</span> 
                    <button onclick="closePreview()" class="h-8 w-8 rounded-full bg-white/10 flex items-center justify-center text-white hover:bg-white/20 transition-all">✕</button>
                </div>
                <div class="p-8 bg-white/5 max-h-[60vh] overflow-y-auto">
                    <div id="email-body-text" class="text-xs leading-relaxed text-white/90 wrap-content font-medium"></div>
                </div>
                <div class="p-6 bg-white/5 space-y-3 border-t border-white/10">
                    <button id="confirm-action-btn" class="w-full bg-white text-slate-900 py-5 rounded-xl font-bold uppercase tracking-widest text-[11px] active:scale-95 transition-all shadow-lg"> Confirm & Send </button>
                    <p id="modal-hint" class="text-center text-[9px] text-white/40 hidden italic">This will copy the text and open Instagram for you.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function updateUrlParams(paramsObj) {
            const url = new URL(window.location.href);
            Object.keys(paramsObj).forEach(key => {
                if (paramsObj[key]) url.searchParams.set(key, paramsObj[key]);
                else url.searchParams.delete(key);
            });
            window.history.replaceState({}, '', url);
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('content')) {
                document.getElementById('creator-url').value = params.get('content');
            }
            if (params.has('perk')) {
                const perk = params.get('perk');
                const radio = document.querySelector(`input[name="perk"][value="${perk}"]`);
                if (radio) radio.checked = true;
            }
            if (params.get('mode') === 'review') {
                document.getElementById('page-creator').classList.add('hidden');
                document.getElementById('page-business').classList.remove('hidden');
                const contentUrl = params.get('content');
                const requestedPerk = params.get('perk') || 'General Exchange';
                document.getElementById('business-view-link').href = contentUrl;
                document.getElementById('display-perks').innerHTML = `
                    <span class="block text-[9px] uppercase tracking-tighter text-white/50 mb-1">Requested Perk:</span>
                    <span class="font-bold text-white">${requestedPerk}</span>
                `;
            }
        };

        function resetCreator() {
            updateUrlParams({ mode: null, content: null, perk: null });
            window.location.reload();
        }

        function closePreview() {
            document.getElementById('preview-modal').classList.add('hidden');
            document.getElementById('modal-hint').classList.add('hidden');
        }

        function showModal(title, body, onConfirm, isInstagram = false) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('email-body-text').innerText = body;
            document.getElementById('preview-modal').classList.remove('hidden');
            document.getElementById('confirm-action-btn').onclick = onConfirm;
            if (isInstagram) {
                document.getElementById('modal-hint').classList.remove('hidden');
                document.getElementById('confirm-action-btn').innerText = "Copy & Open Instagram";
            } else {
                document.getElementById('modal-hint').classList.add('hidden');
                document.getElementById('confirm-action-btn').innerText = "Send Message";
            }
        }

        function generateRandomCode() {
            const prefixes = ["LAU", "GIFT", "REWARD", "BONUS", "TREAT", "PRESENT"];
            const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
            const randomString = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('promo-input').value = `${prefix}-${randomString}`;
        }

        function copyGeneratedLink() {
            const link = document.getElementById('generated-link-text').innerText;
            const tempInput = document.createElement("input");
            document.body.appendChild(tempInput);
            tempInput.value = link;
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            const btn = document.querySelector('[onclick="copyGeneratedLink()"]');
            btn.innerHTML = '✓';
            setTimeout(() => btn.innerHTML = '<svg width="14" height="14" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></svg>', 2000);
        }

        function processCreatorRequest(method) {
            const postUrl = document.getElementById('creator-url').value;
            const selectedPerk = document.querySelector('input[name="perk"]:checked');
            if (!postUrl) { alertModal("Please provide an Instagram content link."); return; }
            if (!selectedPerk) { alertModal("Please select a perk."); return; }

            const perkValue = selectedPerk.value;
            const currentUrl = new URL(window.location.href);
            currentUrl.searchParams.set('mode', 'review');
            currentUrl.searchParams.set('content', postUrl);
            currentUrl.searchParams.set('perk', perkValue);
            const currentApprovalLink = currentUrl.toString();

            updateUrlParams({ content: postUrl, perk: perkValue });
            document.getElementById('generated-link-text').innerText = currentApprovalLink;
            document.getElementById('approval-link-container').classList.remove('hidden');

            const body = `Hi Team,\n\nI've shared some content featuring your brand and I'd love to add you as a collaborator on the post! \n\nOnce accepted, you'll be featured as a co-author, giving you exposure to my audience while providing fresh assets for your social feed.\n\nI'd love to exchange this partnership for: ${perkValue}.\n\nView Content:\n${postUrl}\n\nInternal Review Link:\n${currentApprovalLink}\n\nBest,\n[Your Name]`;

            if (method === 'email') {
                showModal("Email Preview", body, () => {
                    window.location.href = `mailto:?subject=Collaboration Request, Laulima&body=${encodeURIComponent(body)}`;
                });
            } else {
                showModal("Instagram DM Draft", body, () => {
                    const tempInput = document.createElement("textarea");
                    tempInput.value = body;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    window.open("https://www.instagram.com/direct/inbox/", "_blank");
                }, true);
            }
        }

        function alertModal(msg) {
            showModal("Attention", msg, closePreview);
            document.getElementById('confirm-action-btn').innerText = "Okay";
        }

        function processBusinessResponse(type, method) {
            let body;
            const params = new URLSearchParams(window.location.search);
            const requestedPerk = params.get('perk') || 'the requested perk';
            if (type === 'accept') {
                const code = document.getElementById('promo-input').value;
                if (!code) generateRandomCode();
                const finalCode = document.getElementById('promo-input').value;
                body = `Hi!\n\nWe love your content and would like to collaborate with you! We've accepted the request—we're excited for the shared exposure and the fresh engagement this brings to both our audiences.\n\nAs promised, here is the code for you to use on our website: ${requestedPerk}.\n\nYour Exclusive Code: ${finalCode}\n\nSee you soon!\n\nTeam [Your Name]`;
            } else {
                body = `Hi,\n\nThanks for sharing your post. We aren't able to move forward with a collaboration for the ${requestedPerk} at this time, but we really appreciate your support and would love to encourage you to try again!\n\nBest,\nTeam [Your Name]`;
            }
            if (method === 'email') {
                showModal(`${type === 'accept' ? 'Approval' : 'Decline'} via Email`, body, () => {
                    window.location.href = `mailto:?subject=Update Regarding Your Collaboration&body=${encodeURIComponent(body)}`;
                });
            } else {
                showModal(`${type === 'accept' ? 'Approval' : 'Decline'} via Instagram`, body, () => {
                    const tempInput = document.createElement("textarea");
                    tempInput.value = body;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    window.open("https://www.instagram.com/direct/inbox/", "_blank");
                }, true);
            }
        }
    </script>
</body>
</html>
